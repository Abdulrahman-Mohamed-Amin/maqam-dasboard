<div class="request-details">

    <!-- Header -->
    <div class="header">
        <div>
            <h2>{{req[0].name}} </h2>
            
        </div>

        <div class="header-actions">
            <span class="status new">{{req[0].arRequestType}}</span>
        </div>
    </div>


    <div class="body">

   
        <div class="main">

            <div class="box">
                <h3>بيانات التواصل</h3>
                <p>📞 {{req[0].phone}}</p>
                <p>📧 {{req[0].email}}</p>
            </div>

            <div class="box">
                <h3>الخدمات المطلوبة</h3>
                <div class="tags">
                    <span>{{req[0].service.arTitle}}</span>
             
                </div>
            </div>

            <div class="box">
                <h3>تفاصيل الطلب</h3>
                <p>نوع الطلب: {{req[0].arRequestType}}</p>
            </div>

        </div>

     
        <div class="side">

            <div class="box">
                <h3>الوقت المناسب</h3>
                <p>{{req[0].availableDateTime}}</p>
            </div>

            <div class="box">
                <h3>ملاحظات</h3>
                <p>{{req[0].notes}}</p>
            </div>

        </div>

    </div>

</div>
